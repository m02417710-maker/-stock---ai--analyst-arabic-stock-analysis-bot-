# ============================================================
# ملف: .github/workflows/scanner.yml
# جدولة التشغيل التلقائي كل 15 دقيقة
# ============================================================

name: 📊 الماسح التلقائي للأسهم

on:
  schedule:
    # يعمل كل 15 دقيقة طوال أيام الأسبوع
    - cron: '*/15 * * * *'
  # يسمح بالتشغيل اليدوي من لوحة التحكم
  workflow_dispatch:

jobs:
  scan-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 تحميل الكود
      uses: actions/checkout@v4
    
    - name: 🐍 إعداد Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 📦 تثبيت المكتبات
      run: |
        pip install yfinance pandas pandas-ta requests
    
    - name: 🔍 تشغيل الماسح
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python scanner.py
    
    - name: 📝 حفظ سجل التشغيل
      run: |
        echo "✅ تم تشغيل الماسح في $(date)" >> scan_log.txt
        cat scan_log.txt
