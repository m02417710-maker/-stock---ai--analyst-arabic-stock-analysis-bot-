# ============================================================
# docker-compose.yml - تشغيل التطبيق مع إعادة تشغيل تلقائي
# ============================================================

version: '3.8'

services:
  stock-analyzer:
    build: .
    container_name: stock_analyzer_pro
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      - TZ=Africa/Cairo
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
